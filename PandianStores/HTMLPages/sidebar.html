<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>SideBar</title>
  <style media="screen">
*{
	font-family: 'Baloo Paaji 2', cursive;
	margin: 0;
	padding: 0;
	box-sizing: border-box;
	list-style: none;
	text-decoration: none;
}

body{
	background: #ffff;
}

.top_navbar{
	position:fixed;
	top: 0;
	left: 0;
	width: 100%;
	height: 60px;
	background:#333333;
	box-shadow: 1px 0 2px rgba(0,0,0,0.125);
	display: flex;
	align-items: center;
	
	
}

.top_navbar .logo{
	width: 400px;
	font-size: 18px;
	font-weight: 300;
	padding: 0 20px;
	color: white;
	letter-spacing: 1.5px;
	text-transform: uppercase;
	border-right: 1px solid #f5f5f5;
}



.top_navbar .menu{
	width: calc(80% - 250px);
	padding: 0 15px;
	display: flex;
	justify-content: space-between;
	align-items: center;
}


.top_navbar .hamburger{
	font-size: 25px;
	cursor: pointer;
	color: white;
}
.top_navbar .text{
	font-size: 15px;
	cursor: pointer;
	color: white;
}
.top_navbar .signout{
	font-size: 20px;
	cursor: pointer;
	color: red;
}
.top_navbar .text:hover{
	color: red;
}
.top_navbar .hamburger:hover{
	color: red;
}
.hover_collapse .sidebar{
	width: 70px;
}

.hover_collapse .sidebar ul li a .text{
	display: none;
}

.sidebar{
	position: fixed;
	overflow-y: scroll;
	top: 60px;
	left: 0;
	width: 220px;
	height: 91.5%;
	background: #333333;
}

.sidebar ul li a{
	display: block;
	padding: 16px 25px;
	border-bottom: 1px solid #black;
	color: #ffffff;
}

.sidebar ul li a .icon{
	font-size: 18px;
  color: white;
	vertical-align: middle;

}

.sidebar ul li a .text{
	margin-left: 19px;
	color: #fff;
  font-family: sans-serif;
  font-size: 12px;
	letter-spacing: 2px;
}

.sidebar ul li a:hover{
	background: #ff0000;
	color: #fff;
}

.click_collapse .sidebar{

}

  </style>
</head>
<body>

	<script src="../js/common.js"></script>
	<link rel="stylesheet" href="../css/customalert.css">

	<div class="wrapper hover_collapse">
		<div class="top_navbar">
			<div class="logo">New Pandian Department Stores</div>
			<div class="menu">
				<div class="hamburger">
					<i class="fas fa-bars"></i>
				</div>
			</div>
			<div class="signout" onclick="signout();">sign out</div>
		</div>
		<div class="sidebar">
			<div class="sidebar_inner">
				<ul>
					<li>
						<a href="#">
							<span class="icon"><i class="fa fa-cart-plus"></i></span>
							<span class="text">Billing</span>
						</a>
					</li>
					<li>
						<a href="#">
							<span class="icon"><i class="fa fa-plus"></i></span>
							<span class="text">Add Customer</span>
						</a>
					</li>
					<li>
						<a href="#">
							<span class="icon"><i class="fa fa-plus"></i></span>
							<span class="text">Add dealer</span>
						</a>
					</li>
					<li>
						<a href="#">
							<span class="icon"><i class="fa fa-plus"></i></span>
							<span class="text">Add dealer</span>
						</a>
					</li>
					<li>
						<a href="#">
							<span class="icon"><i class="fa fa-plus"></i></span>
							<span class="text"></span>
						</a>
					</li>
					<li>
						<a href="#">
							<span class="icon"><i class="fa fa-eye"></i></span>
							<span class="text">billing history</span>
						</a>
					</li>
					<li>
						<a href="#">
							<span class="icon"><i class="fa fa-chart-line"></i></span>
							<span class="text">Dash board</span>
						</a>
					</li>
					<li>
						<a href="#">
							<span class="icon"><i class="fa fa-warehouse"></i></span>
							<span class="text">Inventory</span>
						</a>
					</li>
					<li>
						<a href="#">
							<span class="icon"><i class="fa fa-folder-plus"></i></span>
							<span class="text">Add product</span>
						</a>
					</li>
					<li>
						<a href="#">
							<span class="icon"><i class="fa fa-print"></i></span>
							<span class="text">barcode print</span>
						</a>
					</li>
					<li>
						<a href="#">
							<span class="icon"><i class="fa fa-id-card"></i></span>
							<span class="text">Contact</span>
						</a>
					</li>

				</ul>
			</div>
		</div>



	</div>

	<script type="text/javascript">
		var li_items = document.querySelectorAll(".sidebar ul li");
		var hamburger = document.querySelector(".hamburger");
		var wrapper = document.querySelector(".wrapper");
		li_items.forEach((li_item) => {
			li_item.addEventListener("mouseenter", () => {


				li_item.closest(".wrapper").classList.remove("hover_collapse");
			})
		})
		li_items.forEach((li_item) => {
			li_item.addEventListener("mouseleave", () => {

				li_item.closest(".wrapper").classList.add("hover_collapse");

			})
		})
		hamburger.addEventListener("click", () => {

			hamburger.closest(".wrapper").classList.toggle("hover_collapse");
		})
	</script>
</body>
</html>
