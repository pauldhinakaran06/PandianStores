<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!----===== Iconscout CSS ===== -->

    <title>Customer</title>
    <link rel="manifest" href="~/manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="../images/logo11.PNG">
    <meta name="theme-color" content="#000000">
    <style>
        .dash-content .boxes {
            justify-content: start !important;
            margin-top: 5%;
        }

        .padding {
            padding: 0px 30px 15px 0px;
        }

        .Mode {
            position: relative;
            width: 70%;
            left: 70%;
        }

        .Confirm {
            position: absolute;
            bottom: 15px;
            right: 0px;
        }

        .activity dash-content table {
            position: relative;
            left: 3%;
            width: 25%
        }

        .activity {
            display: flex;
            justify-content: space-evenly;
            padding: 3%;
        }

        #gbox_grid, #gview_grid {
            /*background-image: url('../images/Groceryshopping.svg');*/
            background-color: whitesmoke;
            background-size: 112%;
            background-position: center;
            background-repeat: no-repeat;
        }

        .ui-jqgrid tr.jqgroup, .ui-jqgrid tr.jqgrow {
            background-color: transparent !important;
        }

        .ui-jqgrid-btable tr.jqgrow:hover {
            background-color: #e0e0e0 !important;
        }

        .edit-cell {
            background-color: transparent !important;
        }

        #info_dialog {
            position: fixed;
            top: 30% !important;
            left: 40% !important;
        }

        input[name="ItemQuantity"] {
            width: 100%;
            border: 0px;
            background-color: transparent !important;
        }

        .ui-jqgrid .ui-jqgrid-bdiv tr.ui-row-ltr > td {
            text-align: center;
        }

        .ui-icon-triangle-1-e, .ui-icon-triangle-1-s {
            display: none;
        }

        .popup-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /*background: rgba(0, 0, 0, 0.5);*/
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        /* Popup container */
        .popup-container {
            background: white;
            padding: 20px 20px 0px 20px;
            border-radius: 10px;
            width: 80%;
            max-width: 550px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            overflow-y: auto;
            height: 46%;
            max-height: 80%;
            /*bottom: 0px;
        right: 0px;*/
            position: absolute;
        }

        #Customerbillgrid .ui-state-hover, #Customerproductpopup .ui-state-hover {
            background-color: #dcdcdc !important; /* Light gray background */
            cursor: pointer;
        }

        #Customerproductgrid .ui-state-hover {
            background-color: #dcdcdc !important; /* Light gray background */
            cursor: pointer;
        }

        #gbox_grid .ui-jqgrid-caption {
            background: aquamarine; /* Your desired color */
        }

        .ui-jqgrid-titlebar-close {
            display: none;
        }

        .ui-jqgrid-htable th {
            background-color: #e0e0e0 !important;
            font-size: 1.1vw;
            font-weight: bold;
        }

        .ui-jqgrid-htable, #Customerbillgrid {
            width: 100% !important;
        }

        .ui-jqgrid-htable, #Customerproductgrid {
            width: 100% !important;
        }
            /* Optional: Change hover color on the column headers */
            .ui-jqgrid-htable th:hover {
                background-color: #45a049; /* Lighter shade when hovered */
            }

        #gbox_Customerbillgrid td {
            font-weight: normal;
            font-size: 1.1vw;
            text-align: center;
        }

        #gbox_Customerproductgrid th, #gbox_Customergrid th {
            font-weight: bold;
        }

        #gbox_Customerbillgrid th {
            font-weight: bold;
        }

        .edit-icon {
            color: #337ab7 !important;
        }

        #gbox_Customergrid td, #gbox_Customerproductgrid td, #gbox_Customerbillgrid td {
            font-weight: normal;
            font-size: 1.1vw;
            text-align: center;
        }

        .billclose-btn {
            position: absolute;
            right: 24px;
            top: 21px;
            background: transparent;
            border: outset;
            width: 28px;
            line-height: 15px;
        }

        .popup-container .billclose-btn:hover {
            border: ridge;
        }

        .editproductconfirm-btn {
            position: absolute;
            right: -17px;
            top: 10px;
            background: aquamarine;
            border: outset;
            width: 77px;
            line-height: 15px;
            font-weight: bold;
        }

        .popup-container .editproductconfirm-btn:hover {
            border: ridge;
        }

        .modal.Customerproductpopup .popup-container .billclose-btn:hover {
            border: ridge;
        }

        .Customerproductpopup {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            overflow-y: auto;
            max-height: 80%;
            position: absolute;
        }

        .decrement {
            display: block;
            width: 20px;
            background-color: aquamarine;
            border: 0px;
        }

        .ui-jqgrid-empty {
            font-size: 1.1vw;
            color: #FF0000;
            text-align: center;
            padding: 20px;
        }

        .disable {
            pointer-events: none;
            color: darkgray;
        }

        .ui-jqgrid .s-ico {
            display: none !important;
        }

        .ui-jqgrid-sort-order {
            display: none !important;
        }

        .ui-jqgrid-btable tr.jqgrow:hover {
            cursor: default !important;
        }

        .Customercheckout {
            background-color: aquamarine;
            border: outset;
            display: flex;
            justify-self: center;
            position: relative;
            top: 5px;
            cursor: pointer;
            padding: 8px
        }

            .Customercheckout:hover {
                border: ridge;
            }
    </style>
</head>
